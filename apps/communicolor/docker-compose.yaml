# See docker-compose.hostports.yaml for localhost:8081 when developing this app alone.
# Coolify: map FQDN to service `web`, container port 80.
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      PORT: "3001"
    expose:
      - "3001"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_WS_URL: ${VITE_WS_URL:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - internal

networks:
  internal:
    driver: bridge
