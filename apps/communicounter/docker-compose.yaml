# Container port 80 only on `web` (no host bind) so Coolify and multiple apps never fight for 8080/8081.
# Local with host port: docker compose -f docker-compose.yaml -f docker-compose.hostports.yaml up --build
# Coolify: map FQDN to service `web`, container port 80.
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      PORT: "3001"
    expose:
      - "3001"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_WS_URL: ${VITE_WS_URL:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - internal

networks:
  internal:
    driver: bridge
